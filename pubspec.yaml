name: streamit_laravel
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 4.0.1+18

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Commons
  nb_utils: ^7.1.6
  google_fonts: ^6.2.1
  http: ^1.4.0
  intl: ^0.20.2
  firebase_database: ^11.3.10
  html: ^0.15.6
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  lottie: ^3.3.1
  device_info_plus: ^11.5.0
  flutter_spinkit: ^5.2.1
  path_provider: ^2.1.5
  webview_flutter: ^4.13.0
  wakelock_plus: ^1.3.2
  flutter_custom_tabs: ^2.4.0
  stream_transform: ^2.1.1
  path: ^1.9.1


  # Firebase
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  firebase_crashlytics: ^4.3.9
  firebase_messaging: ^15.2.9

  #Notification
  flutter_local_notifications: ^19.3.0

  # Social Login
  google_sign_in: ^6.3.0

  # State Management
  get: ^4.7.2
  get_storage: ^2.1.1

  # Encryption & Storage
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # Pickers
  image_picker: ^1.1.2
  country_picker: ^2.0.27

  #Video Players
  pod_player:
    git:
      url: https://github.com/Raj-GMITS/pod_player.git
      ref: 1.1.0
  youtube_player_flutter: ^9.1.3

  #Subtitle
  subtitle: ^0.1.4

  #QR LINK
  qr_flutter: ^4.1.0

  # XML
  xml: ^6.5.0
  
  # Localization
  flutter_localizations:
    sdk: flutter

  #Voice Search
  speech_to_text: ^7.3.0

  #Focus Sound Effect
  flutter_soloud: ^3.4.1
  webview_flutter_web: ^0.2.3+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/flags/
    - assets/icons/top_10_icon/
    - assets/lottie/
    - assets/icons/navigation/
    - assets/icons/social_media/
    - assets/images/watching_profile/
    - assets/gif/
    - assets/sounds/
    - shorebird.yaml